<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 780"
     font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#94a3b8"/>
    </marker>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="760" height="780" fill="#f8fafc"/>

  <!-- Title -->
  <text x="380" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">Multi-Agent System Architecture</text>
  <text x="380" y="54" text-anchor="middle" font-size="12" fill="#64748b">Five production layers · Claude Sonnet · Agentic RAG</text>

  <!-- User pill -->
  <rect x="280" y="66" width="200" height="44" rx="22" fill="#6366f1" filter="url(#sh)"/>
  <text x="380" y="88" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="white">User Request</text>

  <!-- Arrow 1 -->
  <line x1="380" y1="110" x2="380" y2="131" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── Layer 1: Guardrails ── -->
  <rect x="40" y="133" width="680" height="80" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="40" y="133" width="5" height="80" rx="2.5" fill="#f59e0b"/>
  <circle cx="70" cy="153" r="13" fill="#f59e0b"/>
  <text x="70" y="153" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="700" fill="white">1</text>
  <text x="94" y="153" dominant-baseline="central" font-size="14" font-weight="700" fill="#92400e">Guardrails &amp; Gateway</text>
  <text x="380" y="187" text-anchor="middle" font-size="12" fill="#78350f">Input Validation  ·  PII Filtering  ·  Rate Limiting  ·  Output Sanitization</text>

  <!-- Arrow 2 -->
  <line x1="380" y1="213" x2="380" y2="234" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── Layer 2: Orchestration ── -->
  <rect x="40" y="236" width="680" height="155" rx="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="40" y="236" width="5" height="155" rx="2.5" fill="#8b5cf6"/>
  <circle cx="70" cy="256" r="13" fill="#8b5cf6"/>
  <text x="70" y="256" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="700" fill="white">2</text>
  <text x="94" y="256" dominant-baseline="central" font-size="14" font-weight="700" fill="#4c1d95">Orchestration</text>
  <text x="380" y="278" text-anchor="middle" font-size="12" fill="#6d28d9">Decompose  ·  Route  ·  State Machine  ·  Error Recovery</text>

  <!-- Agent sub-boxes -->
  <rect x="98"  y="292" width="130" height="50" rx="8" fill="white" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="163" y="313" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="700" fill="#7c3aed">Guard</text>
  <text x="163" y="329" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#8b5cf6">Agent</text>

  <rect x="243" y="292" width="130" height="50" rx="8" fill="white" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="308" y="313" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="700" fill="#7c3aed">RAG</text>
  <text x="308" y="329" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#8b5cf6">Agent</text>

  <rect x="388" y="292" width="130" height="50" rx="8" fill="white" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="453" y="313" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="700" fill="#7c3aed">Memory</text>
  <text x="453" y="329" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#8b5cf6">Agent</text>

  <rect x="533" y="292" width="130" height="50" rx="8" fill="white" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="598" y="313" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="700" fill="#7c3aed">Tool</text>
  <text x="598" y="329" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#8b5cf6">Agent</text>

  <text x="380" y="362" text-anchor="middle" font-size="11" fill="#7c3aed" font-style="italic">Subagents run in parallel via Claude Agent SDK</text>

  <!-- Arrow 3 -->
  <line x1="380" y1="391" x2="380" y2="412" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── Layer 3: Tools & MCP ── -->
  <rect x="40" y="414" width="680" height="80" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="40" y="414" width="5" height="80" rx="2.5" fill="#3b82f6"/>
  <circle cx="70" cy="434" r="13" fill="#3b82f6"/>
  <text x="70" y="434" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="700" fill="white">3</text>
  <text x="94" y="434" dominant-baseline="central" font-size="14" font-weight="700" fill="#1e3a8a">Tool &amp; MCP Integration</text>
  <text x="380" y="468" text-anchor="middle" font-size="12" fill="#1d4ed8">MCP Server  ↔  Tool Registry  ↔  Sandboxed Execution  ↔  .mcp.json</text>

  <!-- Arrow 4 -->
  <line x1="380" y1="494" x2="380" y2="515" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── Layer 4: Memory ── -->
  <rect x="40" y="517" width="680" height="80" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="40" y="517" width="5" height="80" rx="2.5" fill="#10b981"/>
  <circle cx="70" cy="537" r="13" fill="#10b981"/>
  <text x="70" y="537" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="700" fill="white">4</text>
  <text x="94" y="537" dominant-baseline="central" font-size="14" font-weight="700" fill="#064e3b">Memory &amp; Context</text>
  <text x="380" y="571" text-anchor="middle" font-size="12" fill="#047857">Short-Term (Map)  ↔  Mid-Term (Session)  ↔  Long-Term (Vector Store)</text>

  <!-- Arrow 5 -->
  <line x1="380" y1="597" x2="380" y2="618" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── Layer 5: Observability ── -->
  <rect x="40" y="620" width="680" height="80" rx="12" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="40" y="620" width="5" height="80" rx="2.5" fill="#f43f5e"/>
  <circle cx="70" cy="640" r="13" fill="#f43f5e"/>
  <text x="70" y="640" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="700" fill="white">5</text>
  <text x="94" y="640" dominant-baseline="central" font-size="14" font-weight="700" fill="#881337">Observability</text>
  <text x="380" y="674" text-anchor="middle" font-size="12" fill="#be123c">Distributed Traces  ·  Token Metrics  ·  Decision Logs  ·  Alerting</text>

  <!-- Arrow 6 -->
  <line x1="380" y1="700" x2="380" y2="721" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Response pill -->
  <rect x="280" y="723" width="200" height="44" rx="22" fill="#10b981" filter="url(#sh)"/>
  <text x="380" y="745" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="white">Agent Response</text>
</svg>
