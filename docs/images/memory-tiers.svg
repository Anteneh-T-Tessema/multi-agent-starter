<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 390"
     font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="390" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Three-Tier Memory Architecture</text>
  <text x="400" y="50" text-anchor="middle" font-size="12" fill="#64748b">Each tier has different scope, TTL, speed, and backend</text>

  <!-- ═══ Card 1: Short-Term ═══ -->
  <!-- Card body -->
  <rect x="28" y="64" width="230" height="306" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <!-- Header (top rounded, bottom flat) -->
  <rect x="28" y="64" width="230" height="58" rx="12" fill="#6366f1"/>
  <rect x="28" y="104" width="230" height="18" fill="#6366f1"/>
  <!-- Header text -->
  <text x="143" y="88" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="700" fill="white">Short-Term</text>
  <text x="143" y="108" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#c7d2fe">Working Memory</text>
  <!-- Icon: stacked cache bars -->
  <rect x="83" y="142" width="120" height="11" rx="3" fill="#e0e7ff"/>
  <rect x="83" y="158" width="120" height="11" rx="3" fill="#c7d2fe"/>
  <rect x="83" y="174" width="120" height="11" rx="3" fill="#a5b4fc"/>
  <rect x="83" y="190" width="120" height="11" rx="3" fill="#6366f1"/>
  <!-- Divider -->
  <line x1="48" y1="216" x2="238" y2="216" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Properties -->
  <text x="143" y="234" text-anchor="middle" font-size="11" fill="#374151"><tspan font-weight="600">Scope: </tspan>Single conversation</text>
  <text x="143" y="252" text-anchor="middle" font-size="11" fill="#374151"><tspan font-weight="600">TTL: </tspan>Request lifetime</text>
  <text x="143" y="270" text-anchor="middle" font-size="11" fill="#374151"><tspan font-weight="600">Backend: </tspan>In-memory Map</text>
  <text x="143" y="288" text-anchor="middle" font-size="11" fill="#374151"><tspan font-weight="600">Latency: </tspan>~0ms (sync)</text>
  <text x="143" y="306" text-anchor="middle" font-size="11" fill="#374151"><tspan font-weight="600">API: </tspan>memory.read(key, 'short')</text>
  <!-- Badge pill -->
  <rect x="68" y="328" width="150" height="28" rx="14" fill="#eef2ff"/>
  <text x="143" y="342" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#4338ca">Volatile · Zero latency</text>

  <!-- ═══ Promotion arrows between Card 1 and Card 2 ═══ -->
  <text x="291" y="222" text-anchor="middle" font-size="9" fill="#94a3b8">promote</text>
  <line x1="258" y1="229" x2="283" y2="229" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="291" y="244" text-anchor="middle" font-size="9" fill="#94a3b8">recall</text>
  <line x1="284" y1="240" x2="259" y2="240" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ Card 2: Mid-Term ═══ -->
  <rect x="286" y="64" width="230" height="306" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="286" y="64" width="230" height="58" rx="12" fill="#0284c7"/>
  <rect x="286" y="104" width="230" height="18" fill="#0284c7"/>
  <text x="401" y="88" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="700" fill="white">Mid-Term</text>
  <text x="401" y="108" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#bae6fd">Session Memory</text>
  <!-- Icon: horizontal ledger bars -->
  <rect x="336" y="142" width="130" height="9" rx="3" fill="#0ea5e9"/>
  <rect x="336" y="157" width="100" height="9" rx="3" fill="#38bdf8" opacity="0.8"/>
  <rect x="336" y="172" width="115" height="9" rx="3" fill="#7dd3fc" opacity="0.6"/>
  <rect x="336" y="187" width="85"  height="9" rx="3" fill="#bae6fd" opacity="0.5"/>
  <rect x="336" y="202" width="110" height="9" rx="3" fill="#e0f2fe" opacity="0.4"/>
  <!-- Divider -->
  <line x1="306" y1="216" x2="496" y2="216" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Properties -->
  <text x="401" y="234" text-anchor="middle" font-size="11" fill="#374151"><tspan font-weight="600">Scope: </tspan>User session</text>
  <text x="401" y="252" text-anchor="middle" font-size="11" fill="#374151"><tspan font-weight="600">TTL: </tspan>Session duration</text>
  <text x="401" y="270" text-anchor="middle" font-size="11" fill="#374151"><tspan font-weight="600">Backend: </tspan>Plain object (JSON)</text>
  <text x="401" y="288" text-anchor="middle" font-size="11" fill="#374151"><tspan font-weight="600">Latency: </tspan>~0ms (in-process)</text>
  <text x="401" y="306" text-anchor="middle" font-size="11" fill="#374151"><tspan font-weight="600">API: </tspan>memory.read(key, 'mid')</text>
  <!-- Badge pill -->
  <rect x="326" y="328" width="150" height="28" rx="14" fill="#e0f2fe"/>
  <text x="401" y="342" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#0369a1">Durable · Session-scoped</text>

  <!-- ═══ Promotion arrows between Card 2 and Card 3 ═══ -->
  <text x="549" y="222" text-anchor="middle" font-size="9" fill="#94a3b8">promote</text>
  <line x1="516" y1="229" x2="541" y2="229" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="549" y="244" text-anchor="middle" font-size="9" fill="#94a3b8">recall</text>
  <line x1="542" y1="240" x2="517" y2="240" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ Card 3: Long-Term ═══ -->
  <rect x="544" y="64" width="230" height="306" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="544" y="64" width="230" height="58" rx="12" fill="#059669"/>
  <rect x="544" y="104" width="230" height="18" fill="#059669"/>
  <text x="659" y="88" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="700" fill="white">Long-Term</text>
  <text x="659" y="108" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#a7f3d0">Vector Store</text>
  <!-- Icon: vector space dots + connections -->
  <line x1="614" y1="165" x2="649" y2="148" stroke="#6ee7b7" stroke-width="1.5" opacity="0.6"/>
  <line x1="649" y1="148" x2="684" y2="162" stroke="#6ee7b7" stroke-width="1.5" opacity="0.6"/>
  <line x1="614" y1="165" x2="632" y2="195" stroke="#6ee7b7" stroke-width="1.5" opacity="0.6"/>
  <line x1="684" y1="162" x2="672" y2="195" stroke="#6ee7b7" stroke-width="1.5" opacity="0.6"/>
  <line x1="632" y1="195" x2="672" y2="195" stroke="#6ee7b7" stroke-width="1.5" opacity="0.6"/>
  <circle cx="614" cy="165" r="7" fill="#059669"/>
  <circle cx="649" cy="148" r="7" fill="#059669"/>
  <circle cx="684" cy="162" r="7" fill="#059669"/>
  <circle cx="632" cy="195" r="7" fill="#059669"/>
  <circle cx="672" cy="195" r="7" fill="#059669"/>
  <!-- Divider -->
  <line x1="564" y1="216" x2="754" y2="216" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Properties -->
  <text x="659" y="234" text-anchor="middle" font-size="11" fill="#374151"><tspan font-weight="600">Scope: </tspan>Cross-session / global</text>
  <text x="659" y="252" text-anchor="middle" font-size="11" fill="#374151"><tspan font-weight="600">TTL: </tspan>Persistent</text>
  <text x="659" y="270" text-anchor="middle" font-size="11" fill="#374151"><tspan font-weight="600">Backend: </tspan>Vector DB (MCP)</text>
  <text x="659" y="288" text-anchor="middle" font-size="11" fill="#374151"><tspan font-weight="600">Latency: </tspan>~10-50ms (async)</text>
  <text x="659" y="306" text-anchor="middle" font-size="11" fill="#374151"><tspan font-weight="600">API: </tspan>memory.read(key, 'long')</text>
  <!-- Badge pill -->
  <rect x="584" y="328" width="150" height="28" rx="14" fill="#d1fae5"/>
  <text x="659" y="342" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#065f46">Persistent · Semantic</text>
</svg>
